<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Tasks">
<meta name="theme-color" content="#667eea">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Daily Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    min-height: 100vh;
    min-height: -webkit-fill-available;
  }

  header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: env(safe-area-inset-top, 20px) 20px 16px;
    padding-top: calc(env(safe-area-inset-top, 0px) + 20px);
    position: sticky;
    top: 0;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(102,126,234,0.3);
  }

  header h1 { font-size: 1.3rem; font-weight: 700; }
  header p { font-size: 0.78rem; opacity: 0.8; margin-top: 2px; }

  .stats { display: flex; gap: 12px; margin-top: 12px; }
  .stat {
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.75rem;
  }
  .stat span { font-weight: 700; font-size: 1rem; display: block; }

  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 16px 14px calc(env(safe-area-inset-bottom, 0px) + 80px);
  }

  .add-card {
    background: white;
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .add-card h2 { font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 10px; }

  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }

  input[type="text"], input[type="date"], select {
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 1rem;
    width: 100%;
    outline: none;
    background: #fafafa;
    -webkit-appearance: none;
    appearance: none;
    color: #1a1a2e;
  }

  input[type="text"]:focus, input[type="date"]:focus, select:focus {
    border-color: #667eea;
    background: white;
  }

  .form-meta { display: flex; gap: 8px; flex-wrap: wrap; }
  .form-meta select { flex: 1; min-width: 130px; }
  .form-meta input[type="date"] { flex: 1; min-width: 140px; }

  button.add-btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px 18px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .filters { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px; padding-bottom: 2px; }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    border: 1.5px solid #ddd;
    background: white;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    white-space: nowrap;
    color: #555;
    flex-shrink: 0;
  }

  .filter-btn.active {
    background: #667eea;
    border-color: #667eea;
    color: white;
    font-weight: 600;
  }

  .task-item {
    background: white;
    border-radius: 14px;
    padding: 14px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    border-left: 4px solid transparent;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .task-item.done { opacity: 0.45; }
  .task-item.done .task-title { text-decoration: line-through; color: #aaa; }
  .task-item[data-priority="high"]   { border-left-color: #ff4757; }
  .task-item[data-priority="medium"] { border-left-color: #ffa502; }
  .task-item[data-priority="low"]    { border-left-color: #2ed573; }

  .task-check {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid #ddd;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }
  .task-check.checked { background: #667eea; border-color: #667eea; }
  .task-check.checked::after { content: '✓'; color: white; font-size: 14px; font-weight: 700; }

  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 0.95rem; font-weight: 500; word-break: break-word; line-height: 1.4; }

  .task-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  .tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .tag-high   { background: #ffe0e3; color: #ff4757; }
  .tag-medium { background: #fff0d6; color: #e07b00; }
  .tag-low    { background: #d6f8e6; color: #1a9e52; }
  .tag-date   { background: #f0f0f0; color: #666; }
  .tag-date.overdue { background: #ffe0e3; color: #ff4757; }

  .cat-work     { background: #e0f0ff; color: #0070cc; }
  .cat-personal { background: #fce8ff; color: #9b30c8; }
  .cat-health   { background: #e8fff0; color: #1a9e52; }
  .cat-study    { background: #fff8e0; color: #c87800; }
  .cat-other    { background: #f0f0f0; color: #555; }

  .task-del {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1.3rem;
    padding: 4px 6px;
    border-radius: 6px;
    flex-shrink: 0;
    line-height: 1;
  }

  .empty { text-align: center; padding: 50px 20px; color: #bbb; font-size: 0.9rem; }
  .empty div { font-size: 2.5rem; margin-bottom: 8px; }

  @media (max-width: 400px) {
    .form-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <h1>📋 Daily Tasks</h1>
  <p id="today-label"></p>
  <div class="stats">
    <div class="stat"><span id="stat-total">0</span>合計</div>
    <div class="stat"><span id="stat-done">0</span>完了</div>
    <div class="stat"><span id="stat-remain">0</span>残り</div>
  </div>
</header>

<main>
  <div class="add-card">
    <h2>＋ 新しいタスク</h2>
    <div class="form-row">
      <input type="text" id="task-input" placeholder="タスク名を入力..." maxlength="100">
      <button class="add-btn" id="add-btn">追加</button>
    </div>
    <div class="form-meta">
      <select id="cat-select">
        <option value="work">💼 仕事</option>
        <option value="personal">🏠 プライベート</option>
        <option value="health">🏃 健康</option>
        <option value="study">📚 勉強</option>
        <option value="other" selected>📌 その他</option>
      </select>
      <select id="pri-select">
        <option value="high">🔴 高優先</option>
        <option value="medium" selected>🟡 中優先</option>
        <option value="low">🟢 低優先</option>
      </select>
      <input type="date" id="due-input">
    </div>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">すべて</button>
    <button class="filter-btn" data-filter="active">未完了</button>
    <button class="filter-btn" data-filter="done">完了済み</button>
    <button class="filter-btn" data-filter="high">🔴 高優先</button>
    <button class="filter-btn" data-filter="today">📅 今日</button>
  </div>

  <div id="task-list"></div>
</main>

<script>
(function() {
  const CATS = {
    work:     { label: '💼 仕事',        cls: 'cat-work' },
    personal: { label: '🏠 プライベート', cls: 'cat-personal' },
    health:   { label: '🏃 健康',        cls: 'cat-health' },
    study:    { label: '📚 勉強',        cls: 'cat-study' },
    other:    { label: '📌 その他',      cls: 'cat-other' },
  };
  const PRI = {
    high:   { label: '高優先', cls: 'tag-high' },
    medium: { label: '中優先', cls: 'tag-medium' },
    low:    { label: '低優先', cls: 'tag-low' },
  };

  let tasks = [];
  let currentFilter = 'all';

  try { tasks = JSON.parse(localStorage.getItem('daily-tasks') || '[]'); } catch(e) {}

  function save() {
    try { localStorage.setItem('daily-tasks', JSON.stringify(tasks)); } catch(e) {}
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function addTask() {
    const input = document.getElementById('task-input');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }
    tasks.unshift({
      id: Date.now(),
      title,
      category: document.getElementById('cat-select').value,
      priority: document.getElementById('pri-select').value,
      due: document.getElementById('due-input').value,
      done: false,
      created: todayStr(),
    });
    input.value = '';
    document.getElementById('due-input').value = '';
    save(); render(); input.focus();
  }

  function toggleDone(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function getFiltered() {
    const td = todayStr();
    if (currentFilter === 'active') return tasks.filter(t => !t.done);
    if (currentFilter === 'done')   return tasks.filter(t => t.done);
    if (currentFilter === 'high')   return tasks.filter(t => t.priority === 'high');
    if (currentFilter === 'today')  return tasks.filter(t => t.due === td || (!t.done && t.created === td));
    return tasks;
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const td = todayStr();
    const list = getFiltered();
    document.getElementById('stat-total').textContent  = tasks.length;
    document.getElementById('stat-done').textContent   = tasks.filter(t => t.done).length;
    document.getElementById('stat-remain').textContent = tasks.filter(t => !t.done).length;

    const container = document.getElementById('task-list');
    if (!list.length) {
      container.innerHTML = '<div class="empty"><div>🎉</div>タスクがありません</div>';
      return;
    }

    const priOrder = { high:0, medium:1, low:2 };
    const sorted = list.slice().sort((a,b) => {
      if (a.done !== b.done) return a.done ? 1 : -1;
      const pa = priOrder[a.priority] ?? 1, pb = priOrder[b.priority] ?? 1;
      if (pa !== pb) return pa - pb;
      if (a.due && b.due) return a.due < b.due ? -1 : 1;
      if (a.due) return -1; if (b.due) return 1;
      return b.id - a.id;
    });

    container.innerHTML = sorted.map(t => {
      const cat = CATS[t.category] || CATS.other;
      const pri = PRI[t.priority] || PRI.medium;
      const overdue = t.due && t.due < td && !t.done;
      const dueTag = t.due
        ? `<span class="tag tag-date${overdue?' overdue':''}">${overdue?'⚠ ':'📅 '}${esc(t.due)}${overdue?' 期限切れ':''}</span>`
        : '';
      return `<div class="task-item${t.done?' done':''}" data-priority="${esc(t.priority)}">
        <div class="task-check${t.done?' checked':''}" data-action="toggle" data-id="${t.id}"></div>
        <div class="task-body">
          <div class="task-title">${esc(t.title)}</div>
          <div class="task-meta">
            <span class="tag ${cat.cls}">${cat.label}</span>
            <span class="tag ${pri.cls}">${pri.label}</span>
            ${dueTag}
          </div>
        </div>
        <button class="task-del" data-action="delete" data-id="${t.id}">×</button>
      </div>`;
    }).join('');
  }

  document.getElementById('task-list').addEventListener('click', e => {
    const el = e.target.closest('[data-action]');
    if (!el) return;
    const id = Number(el.dataset.id);
    if (el.dataset.action === 'toggle') toggleDone(id);
    if (el.dataset.action === 'delete') deleteTask(id);
  });

  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  const d = new Date();
  document.getElementById('today-label').textContent =
    d.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

  render();

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
